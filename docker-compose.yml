services:
  db:
    image: postgres:16-alpine
    container_name: naija_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NaijaMarket2024!
      POSTGRES_DB: naijamarketdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d naijamarketdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: naija_backend
    env_file: ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
